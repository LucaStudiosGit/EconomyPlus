# EconomyPlus, config.yml

defaults:
  # Used when a command/API call does not specify a currency
  primary-currency: "coins"

  # Given to players the first time they are seen by the plugin
  starting-balances:
    coins: 100
    gems: 0
    shards: 20

tax:
  pay:
    # Tax = (amount * percent/100) + flat
    percent: 0
    flat: 5
    rounding: "down"   # up, down, nearest

hud:
  # Which currency to display in the wallet HUD
  currency: "all" # primary or all

storage:
  file: "balances.json"
  autosave-seconds: 30