# EconomyPlus, currencies.yml
# Define as many currencies as you want here.
# The key under "currencies" is the currencyId used in commands and API.

currencies:

  gems:
    name: "Gems"
    symbol: "♦"
    decimals: 0
    format: "suffix"   # prefix, suffix
    hud-display:
      show-symbol: true
      show-name: false
  shards:
    name: "Shards"
    symbol: "♦"
    decimals: 0
    format: "suffix"   # prefix, suffix
    hud-display:
      show-symbol: true
      show-name: false
  coins:
    name: "Coins"
    symbol: "¢"
    decimals: 0
    format: "prefix"   # prefix, suffix
    hud-display:
      show-symbol: true
      show-name: false

