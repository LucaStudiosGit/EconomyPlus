# =========================
# TAB, Player List Settings
# =========================
#
# Colors are hex strings, example, "#FFFFFF"
#

default:
  # Prefix shown for regular players
  text: "[MEMBER] "
  # Prefix color
  tagColor: "#0000FF"
  # Player name color
  nameColor: "#FFFFFF"

op:
  # Prefix shown for operators
  text: "[OP] "
  # Prefix color
  tagColor: "#FF0000"
  # Player name color
  nameColor: "#FFFFFF"

# How often to refresh the list, in seconds
refreshIntervalSeconds: 10
